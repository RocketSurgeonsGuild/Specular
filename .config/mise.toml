[tools]
"github:microsoft/apm" = { version = "v0.26.0", bin = "apm" }
"github:eljulians/skillfile" = { version = "v1.7.4", bin = "skillfile" }
hk = "1.51.0"
pkl = "0.32.0"
node = "24.18.0"
actionlint = "1.7.12"
biome = "2.5.2"

"dotnet:gitversion.tool" = "6.6.0"
"dotnet:dotnet-reportgenerator-globaltool" = "5.5.3"
"dotnet:codecov.tool" = "1.13.0"
"dotnet:jetbrains.resharper.globaltools" = "2025.3.3"
"dotnet:jetbrains.dotcover.commandlinetools" = "2025.3.3"
"dotnet:jetbrains.dottrace.globaltools" = "2025.3.3"
"dotnet:dotnet-coverage" = "18.5.1"
"dotnet:dotnet-outdated-tool" = "4.7.0"
"dotnet:verify.tool" = "0.7.0"
"dotnet:gitreleasemanager.tool" = "0.20.0"
"dotnet:NuGet.Mcp.Server" = "1.4.3"
"dotnet:docfx" = "2.78.5"
"dotnet:hertzole.docfx2astro" = "1.4.1"
tombi = "1.2.4"
oxfmt = "0.59.0"
# dotnet

[tasks]
build = { run = "dotnet run build/Build.cs" }
"docs:api" = { run = "docfx metadata docfx.json", description = "Generate docfx API metadata (YAML) from source; the docs site's docfx-api loader converts it to Markdown via docfx2astro on every load" }
docs = { run = "npm run dev --workspace docs", depends = [
  "docs:api",
], description = "Start Astro/Starlight dev server" }
"docs:preview" = { run = "npm run preview --workspace docs", description = "Preview built Starlight site" }
"docs:build" = { run = "npm run build --workspace docs", depends = [
  "docs:api",
], description = "Build the Starlight site (API reference Markdown is pre-generated by the docs:api task)" }
"roslyn-lsp" = { run = "bash build/scripts/install-roslyn-lsp.sh", description = "Install the Microsoft Roslyn language server for this RID" }
"pkl-vscode" = { run = "bash build/scripts/install-pkl-vscode.sh", description = "Install the Pkl VS Code extension (not in marketplace; installed from VSIX)" }

[settings]
prereleases = true
idiomatic_version_file_enable_tools = ["dotnet"]

[env]
HK_MISE = 1
# Keep npm's download cache inside the mise data dir so jdx/mise-action's
# cache (which caches MISE_DATA_DIR / ~/.local/share/mise) also persists npm
# tarballs across CI runs. `npm ci` still wipes node_modules, but reuses these.
npm_config_cache = "{{env.HOME}}/.local/share/mise/npm-cache"
# Microsoft Roslyn language server (Microsoft.CodeAnalysis.LanguageServer), installed by the
# `roslyn-lsp` task from the Azure DevOps vs-impl feed. The wrapper lands on PATH below.
ROSLYN_LSP_VERSION = "4.8.0-7.26274.14"
PKL_VSCODE_VERSION = "0.22.0"

[hooks]
postinstall = ["hk install --mise", "npm install"]
